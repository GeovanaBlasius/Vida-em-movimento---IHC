name: Build - Windows e Mac

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:

  build-windows:
    name: Windows (.exe installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install "opencv-python>=4.13.0" "mediapipe==0.10.14" "numpy>=2.4.0" "PySide6==6.11.1" pyinstaller

      - name: Build PyInstaller
        run: pyinstaller VidaEmMovimento.spec --noconfirm

      - name: Instalar Inno Setup
        run: choco install innosetup --yes

      - name: Gerar instalador .exe
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss'
        shell: pwsh

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VidaEmMovimento-Windows
          path: instaladores\VidaEmMovimento-Setup-Windows.exe
          retention-days: 30

  build-mac:
    name: Mac Apple Silicon (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install "opencv-python>=4.13.0" "mediapipe==0.10.14" "numpy>=2.4.0" "PySide6==6.11.1" pyinstaller

      - name: Build PyInstaller
        run: pyinstaller VidaEmMovimento.spec --noconfirm

      - name: Gerar instalador .dmg
        run: |
          mkdir -p instaladores
          hdiutil create \
            -volname "Vida em Movimento" \
            -srcfolder "dist/VidaEmMovimento/VidaEmMovimento.app" \
            -ov -format UDZO \
            "instaladores/VidaEmMovimento-Mac-AppleSilicon.dmg"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VidaEmMovimento-Mac-AppleSilicon
          path: instaladores/VidaEmMovimento-Mac-AppleSilicon.dmg
          retention-days: 30

  build-mac-intel:
    name: Mac Intel (.dmg)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install "opencv-python>=4.13.0" "mediapipe==0.10.14" "numpy>=2.4.0" "PySide6==6.11.1" pyinstaller

      - name: Build PyInstaller
        run: pyinstaller VidaEmMovimento.spec --noconfirm

      - name: Gerar instalador .dmg
        run: |
          mkdir -p instaladores
          hdiutil create \
            -volname "Vida em Movimento" \
            -srcfolder "dist/VidaEmMovimento/VidaEmMovimento.app" \
            -ov -format UDZO \
            "instaladores/VidaEmMovimento-Mac-Intel.dmg"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: VidaEmMovimento-Mac-Intel
          path: instaladores/VidaEmMovimento-Mac-Intel.dmg
          retention-days: 30
